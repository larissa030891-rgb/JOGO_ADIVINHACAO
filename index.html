<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Adivinhação</title>
    <link href="style.css" rel="stylesheet">
    <script src="java.js" defer></script>
</head>
<body>

    <main class="container">
        <h1>Jogo de Adivinhação</h1>
        <p class="descricao">O objetivo desse jogo é adivinhar qual número foi sorteado pelo programa. Você pode escolher o nivel de dificuldade entre Fácil (1 á 50), Médio (1 á 100) e Dificil (1 á 150), e terá 10 tentativas para acertar o número. Boa sorte!</p>

        <div class="caixa">
            <div>
            <label>Escolha a dificuldade:</label>
                <select id="dificuldade" onchange="sortear()">
                    <option value="facil">Fácil</option>
                    <option value="medio">Médio</option>
                    <option value="dificil">Difícil</option>
                </select>
            </div>

            <div class="campo-grupo">
                <label for="palpite">Digite o seu palpite:</label>
                <div class="input-container">
                    <input type="number" id="palpite" placeholder="0">
                    <button id="btnChutar" onclick="Chutar()">Chutar</button>
                    <button id="reiniciar" onclick="Reiniciar()">Reiniciar</button>
                </div>
            </div>
            
            <div class="status-grupo">
                <h2>Tentativas: <span id="tentativas">10</span></h2>
                <p id="resultado" class="feedback-texto"></p>
                <p id="dica" class="feedback-texto dica"></p>
            </div>
        </div>
    </main>

</body>
</html>
